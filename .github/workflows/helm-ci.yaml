name: Helm Chart CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint chart
        run: helm lint datalayers-single/

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Create kind cluster
        uses: helm/kind-action@v1

      - name: Template validation
        run: helm template test datalayers-single/ | kubectl apply --dry-run=server -f -

      - name: Install chart
        run: helm install datalayers datalayers-single/

      - name: Wait for Pod ready
        run: kubectl wait --for=condition=Ready pod/datalayers-datalayers-single-0 --timeout=120s

      - name: Run Helm test
        run: helm test datalayers

      - name: Show Pod logs on failure
        if: failure()
        run: |
          kubectl describe pod datalayers-datalayers-single-0
          kubectl logs datalayers-datalayers-single-0
