name: Version Bump & Release

on:
  workflow_dispatch:
    inputs:
      chart:
        description: 'Chart name'
        required: true
        default: 'datalayers-single'
        type: choice
        options:
          - datalayers-single
      version:
        description: 'New chart version (e.g. 1.2.3 or 0.0.1-alpha.1)'
        required: true
        type: string

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Validate version format
        run: |
          if ! echo "${{ inputs.version }}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+(-.+)?$'; then
            echo "::error::Version must be semver format (e.g. 1.2.3 or 0.0.1-alpha.1)"
            exit 1
          fi

      - name: Check tag does not already exist
        run: |
          TAG="${{ inputs.chart }}-${{ inputs.version }}"
          if git ls-remote --tags origin "refs/tags/$TAG" | grep -q "$TAG"; then
            echo "::error::Tag '$TAG' already exists"
            exit 1
          fi

      - name: Update Chart.yaml version
        run: |
          sed -i "s/^version: .*/version: ${{ inputs.version }}/" "${{ inputs.chart }}/Chart.yaml"
          grep '^version:' "${{ inputs.chart }}/Chart.yaml"

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ inputs.chart }}/Chart.yaml"
          git diff --cached --quiet && echo "Chart.yaml already at version ${{ inputs.version }}" || \
            git commit -m "chore(${{ inputs.chart }}): bump version to ${{ inputs.version }}"
          git tag "${{ inputs.chart }}-${{ inputs.version }}"
          git push origin main --tags

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint chart
        run: helm lint ${{ inputs.chart }}/

      - name: Package chart
        run: helm package ${{ inputs.chart }}/

      - name: Determine pre-release
        id: meta
        run: |
          if echo "${{ inputs.version }}" | grep -q '-'; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.chart }}-${{ inputs.version }}
          name: ${{ inputs.chart }} ${{ inputs.version }}
          files: ${{ inputs.chart }}-${{ inputs.version }}.tgz
          prerelease: ${{ steps.meta.outputs.prerelease }}
          generate_release_notes: true
