{{- if eq .Values.auth.type "static" }}
apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "datalayers-single.fullname" . }}-test-connection"
  labels:
    {{- include "datalayers-single.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: dlsql
      image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
      command: ['sh', '-c']
      args:
        - 'dlsql -h {{ include "datalayers-single.fullname" . }} -P {{ .Values.service.grpc.port }} -u "$DL_USERNAME" -p "$DL_PASSWORD" -e "SHOW DATABASES"'
      env:
        - name: DL_USERNAME
          valueFrom:
            secretKeyRef:
              name: {{ include "datalayers-single.authSecretName" . }}
              key: {{ .Values.auth.static.secretKeys.username }}
        - name: DL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "datalayers-single.authSecretName" . }}
              key: {{ .Values.auth.static.secretKeys.password }}
  restartPolicy: Never
{{- end }}
