apiVersion: v1
kind: Service
metadata:
  name: {{ include "datalayers-single.fullname" . }}
  labels:
    {{- include "datalayers-single.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.grpc.port }}
      targetPort: grpc
      protocol: TCP
      name: grpc
    - port: {{ .Values.service.http.port }}
      targetPort: http
      protocol: TCP
      name: http
    {{- if .Values.service.postgres.enabled }}
    - port: {{ .Values.service.postgres.port }}
      targetPort: postgres
      protocol: TCP
      name: postgres
    {{- end }}
    {{- if .Values.service.redis.enabled }}
    - port: {{ .Values.service.redis.port }}
      targetPort: redis
      protocol: TCP
      name: redis
    {{- end }}
    {{- if .Values.service.prometheus.enabled }}
    - port: {{ .Values.service.prometheus.port }}
      targetPort: prometheus
      protocol: TCP
      name: prometheus
    {{- end }}
  selector:
    {{- include "datalayers-single.selectorLabels" . | nindent 4 }}
